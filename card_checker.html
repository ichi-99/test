<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Card Checker</title>\n</head>\n<body>\n    <h1>Mass Card Checker</h1>\n    <form id="cardForm">\n        <label for="cardNumber">Card Number:</label>\n        <input type="text" id="cardNumber" name="cardNumber" required/>\n        <button type="submit">Check</button>\n    </form>\n    <div id="results"></div>\n    <script src="https://js.stripe.com/v3/"></script>\n    <script>\n        const form = document.getElementById('cardForm');\n        const resultsDiv = document.getElementById('results');\n        const stripe = Stripe('your_stripe_public_key'); // Replace with your Stripe public key\n\n        form.addEventListener('submit', async (event) => {\n            event.preventDefault();\n            const cardNumber = document.getElementById('cardNumber').value;\n            const response = await fetch('https://api.stripe.com/v1/tokens', {\n                method: 'POST',\n                headers: {\n                    'Authorization': 'Bearer your_stripe_secret_key', // Replace with your Stripe secret key\n                    'Content-Type': 'application/x-www-form-urlencoded'\n                },\n                body: `card[number]=${cardNumber}`\n            });\n            const cardData = await response.json();\n            if (cardData.error) {\n                resultsDiv.innerHTML = `<p>Error: ${cardData.error.message}</p>`;\n            } else {\n                resultsDiv.innerHTML = `<p>Card Type: ${cardData.card.brand}<br/>Expiry: ${cardData.card.exp_month}/${cardData.card.exp_year}<br/>Bank: ${cardData.card.bank}<br/>Country: ${cardData.card.country}</p>`;\n                // Export results to CSV\n                exportToCSV(cardData);\n            }\n        });\n\n        function exportToCSV(data) {\n            const csvContent = `data:text/csv;charset=utf-8,` + \n                `Card Type,Expiry,Bank,Country\n` + \n                `${data.card.brand},${data.card.exp_month}/${data.card.exp_year},${data.card.bank},${data.card.country}`;\n            const encodedUri = encodeURI(csvContent);\n            const link = document.createElement('a');\n            link.setAttribute('href', encodedUri);\n            link.setAttribute('download', 'card_data.csv');\n            document.body.appendChild(link); // Required for Firefox\n            link.click();\n            document.body.removeChild(link);\n        }\n    </script>\n</body>\n</html>
